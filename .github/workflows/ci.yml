name: Compiler CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout Compiler Repository
        uses: actions/checkout@v4

      - name: Checkout Test Framework
        uses: actions/checkout@v4
        with:
          repository: Peruere1828/nju-compiler-test
          path: test_framework

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-7 g++-7 flex libbison-dev bison spim python3.8 python3-pip make
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-7 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-7 100
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.8 100

      - name: Run Progressive Tests
        run: python3 ci_orchestrator.py